services:
  - type: web
    name: xiaohongshu-food-share
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - src/**/*
        - server.js
        - vite.config.js
      ignoredPaths:
        - .gitignore
        - README.md
        - CHANGELOG.md
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"
      - key: FRONTEND_URL
        value: "https://xiaohongshu-1k78.onrender.com"
      - key: DB_PATH
        value: "/var/data/xiaohongshu.db"
    volumes:
      - name: data
        path: /var/data
